name: Deploy Backend
on:
  push:
    branches: [ main ]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: luisarrabalgutierrez
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/tutor-ai
            git reset --hard origin/main
            git pull origin main
            cd backend
            source venv/bin/activate
            pip install -r requirements.txt
            
            # Matar procesos de forma segura
            fuser -k 8000/tcp || true
            pkill -f ngrok || true
            sleep 2

            # Lanzar Uvicorn
            nohup python3 -m uvicorn main:app --host 0.0.0.0 --port 8000 > uvicorn.log 2>&1 &
            
            # Lanzar Ngrok (asumiendo que el authtoken ya está configurado en la VM)
            nohup ngrok http 8000 > ~/ngrok.log 2>&1 &
            
            # Dar tiempo a los procesos y salir con éxito forzado
            sleep 5
            exit 0